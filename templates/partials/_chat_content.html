<div class="card">
    <div class="card-header">
        <div class="icon-badge">
            <i class="fa-solid fa-comments"></i>
        </div>
        <h2 class="card-title">Chat</h2>
    </div>
    
    <!-- Language Pair Selection -->
    <div class="chat-controls">
        <div class="button-group">
            <button id="add-language-pair" class="save-button">
                <i class="fa-solid fa-plus"></i>
                Select Language Pair
            </button>
        </div>
        
        <!-- Language Pair Dropdown -->
        <div id="language-pair-dropdown" class="language-form hidden">
            <div class="form-group">
                <label for="language-pair-select">Select Language Pair</label>
                <select id="language-pair-select" class="form-select">
                    <option value="">Select a language pair...</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="chat-interface">
        <div class="chat-messages" id="chat-messages">
            <!-- messages get appended here -->
        </div>

        <div class="user-input-holder">
            <form action="" id="create-rule-chatbot">
                <div class="button-group">
                    <button type="button" id="propose-missing-rules" class="save-button" disabled>
                        <i class="fa-solid fa-lightbulb"></i>
                        Propose Missing Rules
                    </button>
                </div>

                {# <textarea id="chat-input" rows="1" disabled></textarea> #}

                <button type="submit" id="send-message" class="send-button">
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<div id="language-pairs-list">
    <h3>Your language pairs</h3>
    {% if language_pairs %}
    <ul>
        {% for pair in language_pairs %}
        <li id="pair-{{ pair.pair_id }}">
            <p>{{ pair.native_name }} → {{ pair.target_name }}</p>
            <a href="#"
               hx-delete="/admin-panel/language-pairs/{{ pair.pair_id }}"
               hx-target="#language-pairs-list"
               hx-swap="outerHTML"
               hx-confirm="Delete this language pair?">
                <i class="fa-regular fa-trash-can"></i>
            </a>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p>No language pairs created yet.</p>
    {% endif %}
</div>
